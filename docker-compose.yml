version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - MOCK_LLM=true
      - GOOGLE_GENERATIVEAI_API_KEY=${GOOGLE_GENERATIVEAI_API_KEY}
      - CORS_ORIGINS=http://localhost:3000
      - LOG_LEVEL=INFO
    volumes:
      - ./backend/app:/app/app
      - ./backend/audit:/app/audit
      - ./backend/bias_engine:/app/bias_engine
      - ./backend/policies:/app/policies
      - ./backend/risk_engine:/app/risk_engine
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080
    depends_on:
      - backend

