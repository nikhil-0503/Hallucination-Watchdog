# Railway configuration for the FRONTEND service ONLY.
# In Railway Dashboard, set this service's Root Directory to "." (project root).
# This builds the root Dockerfile which serves the React frontend.
[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

